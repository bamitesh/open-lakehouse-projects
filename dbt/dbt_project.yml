name: open_lakehouse
version: "1.0.0"
config-version: 2

profile: open_lakehouse

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  open_lakehouse:
    bronze:
      +schema: bronze
      +materialized: table
      +tags: ["bronze"]
    silver:
      +schema: silver
      +materialized: table
      +tags: ["silver"]
    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold"]

vars:
  bronze_path: "{{ env_var('LAKEHOUSE_BRONZE_PATH', 'data/bronze') }}"
  silver_path: "{{ env_var('LAKEHOUSE_SILVER_PATH', 'data/silver') }}"
  gold_path:   "{{ env_var('LAKEHOUSE_GOLD_PATH',   'data/gold')   }}"
